<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merchant Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="logo">Merchant Dashboard</div>
        <button id="logoutButton">Logout</button>
    </header>
    <main>
        <section id="add-product-section">
            <form>
                <input type="text" id="productName" placeholder="Product Name">
                <input type="text" id="productDescription" placeholder="Product Description">
                <input type="number" id="productPrice" placeholder="Product Price">
                <input type="number" id="productStock" placeholder="Product Stock">
                <input type="text" id="productImageUrl" placeholder="Product Image URL">
                <button id="addProductButton">Add Product</button>
            </form>
        </section>

        <section id="receive-supplies-section">
            <button id="showReceivedSuppliesButton">Show Received Supplies</button>
            <div id="receivedSuppliesList" style="display: none;"></div>
        </section>

        <section id="send-merchandise-section">
            <form>
                <input type="text" id="customerId" placeholder="Customer ID">
                <input type="text" id="productIdToSend" placeholder="Product ID">
                <input type="number" id="quantityToSend" placeholder="Quantity">
                <button id="sendMerchandiseButton">Send Merchandise</button>
            </form>
        </section>

        <section id="list-products-section">
            <button id="listAllProductsButton">List All Products</button>
            <div id="productList" style="display: none;"></div>
        </section>

        <section id="request-supply-section">
            <h2>Request Supply</h2>
            <input type="number" id="productIdToRequest" placeholder="Product ID" required>
            <input type="number" id="quantityToRequest" placeholder="Quantity" required>
            <button id="requestSupplyButton">Request Supply</button>
        </section>

        <section id="notifications-section">
            <h2>Notifications</h2>
            <ul id="notificationsList"></ul>
        </section>
    </main>
    <footer>
        <nav>
            <a href="marketplace.html">Home</a>
            <a href="#">Contact</a>
        </nav>
    </footer>
    <script src="merchant.js"></script>
</body>
</html>
