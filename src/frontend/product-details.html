<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Product Details</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="logo">Marketplace</div>
        <nav>
            <a href="marketplace.html">Home</a>
            <a href="cart.html">Cart (<span id="cartItemCount">0</span>)</a>
        </nav>
    </header>
    <main>
        <section id="product-details" class="product-details">
            <!-- Product details content will be dynamically inserted here -->
        </section>
        <section id="product-specifications" class="product-specifications">
            <h2>Specifications</h2>
            <ul id="specifications-list" class="no-bullets">
                <!-- Specifications content will be dynamically inserted here -->
            </ul>

            </div>

                <!-- Reviews content will be dynamically inserted here -->
            </div>
        </section>
        <section id="related-products" class="related-products">
            <h2>Related Products</h2>
            <div id="related-products-list">
                <!-- Related products content will be dynamically inserted here -->
            </div>
        </section>
    </main>
    <footer>
        <nav>
            <a href="about.html">About Us</a>
            <a href="contact.html">Contact</a>
